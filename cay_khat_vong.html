<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cây Khát Vọng Tuổi Trẻ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0c0e14; font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; }

  /* ===== SETUP SCREEN ===== */
  #setupScreen {
    position: fixed; inset: 0;
    background: linear-gradient(160deg, #064e3b 0%, #0c0e14 40%, #0c0e14 100%);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; z-index: 100; padding: 40px; overflow-y: auto;
  }
  #setupScreen h1 {
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, #34d399, #10b981);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  #setupScreen > p { color: #666; font-size: 0.85rem; }
  .setup-section {
    background: #151821; border-radius: 16px; padding: 22px 26px;
    width: 100%; max-width: 560px; border: 1px solid #1e2130;
  }
  .setup-section h3 { font-size: 0.82rem; font-weight: 700; color: #34d399; margin-bottom: 14px; }
  .upload-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
  .upload-box {
    background: #0f1117; border: 2px dashed #2a2d3a; border-radius: 12px;
    padding: 14px; text-align: center; cursor: pointer; transition: all 0.3s; width: 230px;
  }
  .upload-box:hover { border-color: #34d399; }
  .upload-box.loaded { border-color: #10b981; border-style: solid; }
  .upload-box label { font-weight: 600; font-size: 0.78rem; display: block; margin-bottom: 4px; color: #bbb; pointer-events: none; }
  .upload-box .hint { font-size: 0.68rem; color: #555; pointer-events: none; }
  .upload-box img { max-width: 100%; max-height: 90px; border-radius: 8px; display: none; margin-top: 8px; }
  .upload-box.loaded img { display: block; margin: 8px auto 0; }
  input[type="file"] { display: none; }
  .carousel-row { display: flex; gap: 10px; align-items: center; margin-top: 12px; flex-wrap: wrap; }
  .carousel-row label { font-size: 0.72rem; color: #666; font-weight: 600; }
  .btn-add-photos {
    font-family: inherit; font-weight: 600; font-size: 0.72rem;
    padding: 6px 14px; border: 1px dashed #34d399; border-radius: 8px;
    background: transparent; color: #34d399; cursor: pointer; transition: all 0.2s;
  }
  .btn-add-photos:hover { background: rgba(52,211,153,0.1); }
  .carousel-count { font-size: 0.68rem; color: #555; }
  .field-wrap { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
  .field-wrap:first-child { margin-top: 0; }
  .field-wrap label { font-size: 0.72rem; color: #888; font-weight: 600; }
  .field-wrap input[type="text"] {
    width: 100%; background: #0f1117; border: 2px solid #2a2d3a; border-radius: 10px;
    color: #e0e0e0; font-family: inherit; font-size: 0.82rem; padding: 10px 14px; outline: none;
    transition: border-color 0.3s;
  }
  .field-wrap input[type="text"]:focus { border-color: #34d399; }
  .field-wrap input[type="text"]::placeholder { color: #3a3d4a; }
  .btn-start {
    width: 100%; max-width: 560px; padding: 16px; border: none; border-radius: 14px;
    background: linear-gradient(135deg, #34d399, #10b981); color: #0c0e14;
    font-family: inherit; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: all 0.3s;
  }
  .btn-start:hover { box-shadow: 0 8px 28px rgba(52,211,153,0.35); transform: translateY(-2px); }
  .btn-start:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

  /* ===== MAIN SCREEN ===== */
  #mainScreen { display: none; position: fixed; inset: 0; background: #0c0e14; }
  #canvasWrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  canvas#cv {
    width: 1920px; height: 1080px;
    transform-origin: center center; display: block;
  }

  /* ===== OVERLAY — ẩn, hover hiện ===== */
  #overlay {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; align-items: flex-end; gap: 10px; z-index: 50;
    opacity: 0; transition: opacity 0.3s;
  }
  #overlay:hover { opacity: 1; }
  .btn-ctrl {
    font-family: inherit; font-weight: 600; font-size: 0.7rem; padding: 7px 14px;
    border: 1px solid #2a2d3a; border-radius: 8px; cursor: pointer;
    background: rgba(30,33,48,0.9); color: #888; transition: all 0.2s; backdrop-filter: blur(4px);
  }
  .btn-ctrl:hover { background: rgba(40,43,61,0.95); color: #ccc; }

  /* ===== CAROUSEL Y SLIDER — ẩn, hover hiện ===== */
  #carouselYWrap {
    position: fixed; right: 12px; top: 50%; transform: translateY(-50%);
    z-index: 60; display: none;
    flex-direction: column; align-items: center; gap: 6px;
    background: rgba(21,24,33,0.9); border: 1px solid #2a2d3a; border-radius: 12px;
    padding: 14px 8px; backdrop-filter: blur(8px);
    opacity: 0; transition: opacity 0.3s;
  }
  #carouselYWrap:hover { opacity: 1; }
  #carouselYWrap .cy-label {
    font-size: 0.6rem; color: #34d399; font-weight: 700; writing-mode: vertical-lr;
    text-orientation: mixed; letter-spacing: 1px;
  }
  #carouselYWrap input[type="range"] {
    writing-mode: vertical-lr; direction: rtl;
    width: 4px; height: 180px;
    -webkit-appearance: slider-vertical; appearance: slider-vertical;
    background: #1e2130; outline: none;
  }
  #carouselYWrap input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
    background: #34d399; cursor: pointer; border: 2px solid #0c0e14;
  }
  #carouselYWrap .cy-val { font-size: 0.68rem; color: #888; font-weight: 600; }

  /* ===== TOAST ===== */
  #toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px);
    background: #10b981; color: #fff; padding: 12px 24px; border-radius: 12px;
    font-size: 0.88rem; font-weight: 700; box-shadow: 0 6px 28px rgba(16,185,129,0.45);
    transition: transform 0.4s ease; z-index: 200; white-space: nowrap; max-width: 90vw;
    overflow: hidden; text-overflow: ellipsis;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* ===== LEAF BURST — bay từ thân vào patch ===== */
  .leaf-burst {
    position: fixed; pointer-events: none; z-index: 300;
    opacity: 0;
    animation: leafAppear 1s ease-out forwards;
  }
  @keyframes leafAppear {
    0%   { opacity: 0.9; transform: scale(0.3); }
    50%  { opacity: 1; transform: scale(1.1); }
    80%  { opacity: 0.7; transform: scale(0.9); }
    100% { opacity: 0; transform: scale(0.5); }
  }

  /* ===== LIGHTBOX ===== */
  .lightbox {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: none; align-items: center; justify-content: center;
    z-index: 400; backdrop-filter: blur(10px); cursor: pointer;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 88vh; border-radius: 14px; }
  .lightbox-close { position: absolute; top: 20px; right: 28px; font-size: 2rem; color: #fff; cursor: pointer; background: none; border: none; }

  /* ===== TICKER ===== */
  #ticker {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(5,150,105,0.15); border-top: 1px solid rgba(52,211,153,0.18);
    padding: 7px 0; overflow: hidden; z-index: 50; backdrop-filter: blur(4px);
    height: 34px;
  }
  #ticker.hidden { display: none; }
  #tickerTrack { display: flex; gap: 80px; white-space: nowrap; animation: scroll 35s linear infinite; }
  #tickerTrack .tick-item { font-size: 0.76rem; color: #6ee7b7; font-weight: 600; }
  #tickerTrack .tick-item .tick-name { color: #34d399; }
  @keyframes scroll { from { transform: translateX(100vw); } to { transform: translateX(-100%); } }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setupScreen">
  <h1>🌳 Cây Khát Vọng Tuổi Trẻ</h1>
  <p>Cấu hình trước khi chiếu lên màn hình LED</p>

  <div class="setup-section">
    <h3>📷 Ảnh cây</h3>
    <div class="upload-row">
      <div class="upload-box" id="box1" onclick="document.getElementById('f1').click()">
        <label>Ảnh gốc — cây đầy lá</label><div class="hint">Click để chọn</div>
        <input type="file" id="f1" accept="image/*"><img id="pv1">
      </div>
      <div class="upload-box" id="box2" onclick="document.getElementById('f2').click()">
        <label>Ảnh đích — cây ít lá</label><div class="hint">Click để chọn</div>
        <input type="file" id="f2" accept="image/*"><img id="pv2">
      </div>
    </div>
    <div class="carousel-row">
      <label>Ảnh kỷ niệm quanh gốc:</label>
      <button class="btn-add-photos" onclick="document.getElementById('fCar').click()">+ Thêm ảnh</button>
      <input type="file" id="fCar" accept="image/*" multiple>
      <span class="carousel-count" id="carCount">0 ảnh</span>
    </div>
  </div>

  <div class="setup-section">
    <h3>🔥 Firebase</h3>
    <div class="field-wrap">
      <label>Firebase Realtime Database URL</label>
      <input type="text" id="fbUrl" placeholder="https://your-project-default-rtdb.firebaseio.com">
    </div>
  </div>

  <button class="btn-start" id="btnStart" disabled>🌿 Bắt đầu sự kiện</button>
</div>

<!-- MAIN -->
<div id="mainScreen">
  <div id="canvasWrap">
    <canvas id="cv" width="1920" height="1080"></canvas>
  </div>

  <div id="overlay">
    <button class="btn-ctrl" id="btnAuto">▶ Demo</button>
    <button class="btn-ctrl" id="btnReset">↺ Reset</button>
  </div>

  <div id="carouselYWrap">
    <span class="cy-label">Vị trí ảnh</span>
    <input type="range" id="slCY" min="20" max="95" value="70" step="1">
    <span class="cy-val" id="valCY">70%</span>
  </div>

  <div id="ticker" class="hidden"><div id="tickerTrack"></div></div>
</div>

<div id="toast"></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
  <img id="lightboxImg" src="">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const DEFAULT_FB_URL = 'https://caykhatvong-c27cc-default-rtdb.asia-southeast1.firebasedatabase.app';

const $ = id => document.getElementById(id);
const cv = $('cv'), ctx = cv.getContext('2d');
const CW = 1920, CH = 1080;
cv.width = CW; cv.height = CH;

let img1 = null, img2 = null;
let patches = [], currentPatch = 0;
let trunkPhotos = [], trunkAngle = 0;
let animFrameId = null, compositeSnapshot = null;
let firebaseUrl = '';
let fbListener = null, knownKeys = new Set();
// crop-fill source rect
let cropRect = null; // { sx, sy, sw, sh }

let carouselCY = 0.70;

if (DEFAULT_FB_URL) $('fbUrl').value = DEFAULT_FB_URL;

// ===== SCALE =====
function scaleCanvas() {
  const s = Math.min(window.innerWidth / CW, window.innerHeight / CH);
  cv.style.transform = `scale(${s})`;
}
window.addEventListener('resize', scaleCanvas);

function loadImg(file) {
  return new Promise(res => {
    const r = new FileReader();
    r.onload = e => { const i = new Image(); i.onload = () => res(i); i.src = e.target.result; };
    r.readAsDataURL(file);
  });
}

// ===== SETUP =====
let _r1 = false, _r2 = false;
function chkReady() { $('btnStart').disabled = !(_r1 && _r2); }

$('f1').addEventListener('change', async e => {
  if (!e.target.files[0]) return;
  img1 = await loadImg(e.target.files[0]);
  $('pv1').src = img1.src; $('box1').classList.add('loaded'); _r1 = true; chkReady();
});
$('f2').addEventListener('change', async e => {
  if (!e.target.files[0]) return;
  img2 = await loadImg(e.target.files[0]);
  $('pv2').src = img2.src; $('box2').classList.add('loaded'); _r2 = true; chkReady();
});
$('fCar').addEventListener('change', async e => {
  for (const f of Array.from(e.target.files)) trunkPhotos.push(await loadImg(f));
  $('carCount').textContent = `${trunkPhotos.length} ảnh`;
  e.target.value = '';
});
$('btnStart').addEventListener('click', () => {
  firebaseUrl = $('fbUrl').value.trim().replace(/\/$/, '');
  $('setupScreen').style.display = 'none';
  $('mainScreen').style.display  = 'block';
  scaleCanvas(); initCanvas();
  if (firebaseUrl) startFirebase();
  if (trunkPhotos.length > 0) $('carouselYWrap').style.display = 'flex';
});

// ===== SLIDER Y =====
$('slCY').addEventListener('input', () => {
  const v = parseInt($('slCY').value);
  $('valCY').textContent = v + '%';
  carouselCY = v / 100;
});

// ===== INIT CANVAS — crop-fill (cover) =====
function initCanvas() {
  ctx.clearRect(0, 0, CW, CH);

  // Cover fit: ảnh phủ kín canvas, cắt phần thừa
  const imgAr = img2.width / img2.height;
  const cvAr  = CW / CH;
  let sx, sy, sw, sh;
  if (imgAr > cvAr) {
    // Ảnh rộng hơn → cắt 2 bên
    sh = img2.height; sw = Math.round(sh * cvAr);
    sx = Math.round((img2.width - sw) / 2); sy = 0;
  } else {
    // Ảnh cao hơn → cắt trên/dưới
    sw = img2.width; sh = Math.round(sw / cvAr);
    sx = 0; sy = Math.round((img2.height - sh) / 2);
  }
  cropRect = { sx, sy, sw, sh };

  // Vẽ ảnh ít lá phủ kín
  ctx.drawImage(img2, sx, sy, sw, sh, 0, 0, CW, CH);

  // Vẽ overlay text
  drawOverlayText();

  patches = generatePatches();
  currentPatch = 0;
  saveSnapshot(); startRenderLoop();
}

// ===== OVERLAY TEXT + LOGO =====
function drawOverlayText() {
  // "ĐOÀN XÃ VĨNH TƯỜNG" — trên cùng
  ctx.save();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 28px "Be Vietnam Pro", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 10;
  ctx.fillText('ĐOÀN XÃ VĨNH TƯỜNG', CW/2, 24);
  ctx.restore();

  // "CÂY KHÁT VỌNG TUỔI TRẺ" — dưới cùng
  ctx.save();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 48px "Be Vietnam Pro", sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.shadowColor = 'rgba(0,0,0,0.7)'; ctx.shadowBlur = 12;
  ctx.fillText('CÂY KHÁT VỌNG TUỔI TRẺ', CW/2, CH - 20);
  ctx.restore();
}

// ===== PATCHES — chỉ tán lá, rải đều =====
// Ảnh 1280x761, crop-fill vào 1920x1080
// Tán cây: tâm ~50%X, ~38%Y, ngang ~38%, dọc ~22%
function generatePatches() {
  const pts = [];
  const cx = CW * 0.50, cy = CH * 0.38;
  const rx = CW * 0.36, ry = CH * 0.22;
  const pr = CW * 0.038, step = pr * 1.05;

  // Giới hạn: trên 8% (chữ ĐOÀN), dưới 62% (thân cây)
  const yMin = CH * 0.08;
  const yMax = CH * 0.62;

  for (let py = cy - ry; py <= cy + ry; py += step) {
    for (let px = cx - rx; px <= cx + rx; px += step) {
      const nx = (px - cx) / rx, ny = (py - cy) / ry;
      if (nx * nx + ny * ny > 1.0) continue;
      const fy = py + (Math.random()-0.5)*step*0.35;
      if (fy < yMin || fy > yMax) continue;
      pts.push({
        x: px + (Math.random()-0.5)*step*0.35,
        y: fy,
        radius: pr*(0.8+Math.random()*0.4)
      });
    }
  }
  // Rải đều: Fisher-Yates shuffle
  for (let i = pts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pts[i], pts[j]] = [pts[j], pts[i]];
  }
  return pts;
}

// ===== DRAW PATCH — với tint màu theo type =====
function drawPatchTo(tctx, index, type) {
  const p = patches[index]; if (!p) return;
  const { sx, sy, sw, sh } = cropRect;

  const off = document.createElement('canvas'); off.width = CW; off.height = CH;
  const o = off.getContext('2d');

  // Vẽ ảnh gốc (cây đầy lá) crop-fill
  o.drawImage(img1, sx, sy, sw, sh, 0, 0, CW, CH);

  // Tint màu theo loại
  o.globalCompositeOperation = 'multiply';
  if (type === 'pink') {
    o.fillStyle = 'rgba(255,170,200,0.6)';
  } else if (type === 'red') {
    o.fillStyle = 'rgba(255,50,50,0.65)';
  } else {
    // green — xanh đậm hơn
    o.fillStyle = 'rgba(30,130,50,0.3)';
  }
  o.fillRect(0, 0, CW, CH);
  o.globalCompositeOperation = 'source-over';

  // Radial mask tại vị trí patch
  const g = o.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.radius);
  g.addColorStop(0,   'rgba(255,255,255,1)');
  g.addColorStop(0.5, 'rgba(255,255,255,1)');
  g.addColorStop(0.75,'rgba(255,255,255,0.6)');
  g.addColorStop(1,   'rgba(255,255,255,0)');
  o.globalCompositeOperation = 'destination-in';
  o.fillStyle = g; o.beginPath(); o.arc(p.x, p.y, p.radius, 0, Math.PI*2); o.fill();

  tctx.drawImage(off, 0, 0);
}

function saveSnapshot() {
  const s = document.createElement('canvas'); s.width = CW; s.height = CH;
  s.getContext('2d').drawImage(cv, 0, 0); compositeSnapshot = s;
}

function growOne(type) {
  if (currentPatch >= patches.length) return false;
  type = type || 'green';
  drawPatchTo(compositeSnapshot.getContext('2d'), currentPatch, type);
  spawnLeafBurst(patches[currentPatch], type);
  currentPatch++; return true;
}

// ===== RENDER LOOP =====
function renderFrame() {
  ctx.clearRect(0, 0, CW, CH);
  if (compositeSnapshot) ctx.drawImage(compositeSnapshot, 0, 0);
  if (trunkPhotos.length > 0) { trunkAngle += 0.008; drawTrunkCarousel(); }
  animFrameId = requestAnimationFrame(renderFrame);
}
function startRenderLoop() { if (animFrameId) cancelAnimationFrame(animFrameId); renderFrame(); }

// ===== TRUNK CAROUSEL — dùng tọa độ canvas trực tiếp =====
function drawTrunkCarousel() {
  const tcx = CW * 0.50;
  const tcy = CH * carouselCY;
  const orx = CW * 0.16, ory = CH * 0.02;
  const pw = CW * 0.09, ph = pw * 0.8;
  const n = trunkPhotos.length, as = (Math.PI*2)/n;
  const items = [];
  for (let i = 0; i < n; i++) {
    const a = trunkAngle + i*as, cosA = Math.cos(a), sinA = Math.sin(a);
    const depth = sinA, sc = 0.35+(depth+1)*0.5*0.65, op = 0.2+(depth+1)*0.5*0.8;
    items.push({ img: trunkPhotos[i], x: tcx+cosA*orx, y: tcy+sinA*ory, w: pw*sc, h: ph*sc, depth, op, sc });
  }
  items.sort((a,b) => a.depth - b.depth);
  for (const it of items) {
    const x = it.x-it.w/2, y = it.y-it.h/2, r = 4*it.sc;
    ctx.save(); ctx.globalAlpha = it.op;
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+it.w-r,y); ctx.quadraticCurveTo(x+it.w,y,x+it.w,y+r);
    ctx.lineTo(x+it.w,y+it.h-r); ctx.quadraticCurveTo(x+it.w,y+it.h,x+it.w-r,y+it.h);
    ctx.lineTo(x+r,y+it.h); ctx.quadraticCurveTo(x,y+it.h,x,y+it.h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.clip();
    ctx.drawImage(it.img, x, y, it.w, it.h); ctx.restore();
    if (it.depth > 0.3) {
      ctx.save(); ctx.globalAlpha = it.op*0.6; ctx.strokeStyle = '#34d399'; ctx.lineWidth = 2*it.sc;
      ctx.beginPath();
      ctx.moveTo(x+r,y); ctx.lineTo(x+it.w-r,y); ctx.quadraticCurveTo(x+it.w,y,x+it.w,y+r);
      ctx.lineTo(x+it.w,y+it.h-r); ctx.quadraticCurveTo(x+it.w,y+it.h,x+it.w-r,y+it.h);
      ctx.lineTo(x+r,y+it.h); ctx.quadraticCurveTo(x,y+it.h,x,y+it.h-r);
      ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); ctx.stroke(); ctx.restore();
    }
    if (it.depth > 0.5) {
      ctx.save(); ctx.globalAlpha = 0.15*it.sc; ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(it.x, it.y+it.h/2+4*it.sc, it.w*0.4, 3*it.sc, 0, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
  }
}

// ===== LEAF BURST — bay từ gốc thân đến vị trí patch =====
function spawnLeafBurst(patch, type) {
  const rect = cv.getBoundingClientRect();
  const sx = rect.width/CW, sy = rect.height/CH;

  // Gốc thân cây: ~50%X, ~68%Y
  const baseX = rect.left + CW * 0.50 * sx;
  const baseY = rect.top  + CH * 0.68 * sy;
  // Đích: vị trí patch
  const targX = rect.left + patch.x * sx;
  const targY = rect.top  + patch.y * sy;

  const emojis = type === 'pink' ? ['🌸','🏵️','💮','🌷']
               : type === 'red'  ? ['🌺','❤️','🔴','🌹']
               :                   ['🌿','🍃','🍀','🌱'];

  emojis.forEach((em, i) => {
    const l = document.createElement('div'); l.className = 'leaf-burst'; l.textContent = em;
    const startX = baseX + (Math.random()-0.5)*24;
    const startY = baseY + (Math.random()-0.5)*12;
    l.style.left = startX + 'px';
    l.style.top  = startY + 'px';
    l.style.fontSize = (14+Math.random()*10) + 'px';
    l.style.animationDelay = (i*70) + 'ms';
    // Di chuyển đến patch bằng transition
    l.style.transition = `left 0.7s ease-out ${i*70}ms, top 0.7s ease-out ${i*70}ms`;
    document.body.appendChild(l);
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        l.style.left = (targX + (Math.random()-0.5)*16) + 'px';
        l.style.top  = (targY + (Math.random()-0.5)*16) + 'px';
      });
    });
    setTimeout(() => l.remove(), 1300);
  });
}

// ===== TOAST =====
function showToast(m) {
  const t = $('toast'); t.textContent = m; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ===== TICKER — append, không reset animation =====
function addTicker(name, text) {
  const track = $('tickerTrack');
  const sp = document.createElement('span'); sp.className = 'tick-item';
  sp.innerHTML = `<span class="tick-name">${esc(name||'Ẩn danh')}</span>: "${esc(text)}" &nbsp;🌿`;
  track.appendChild(sp);
  $('ticker').classList.remove('hidden');
}

// ===== FIREBASE POLLING =====
function startFirebase() {
  stopFirebase(); knownKeys.clear();
  fetch(`${firebaseUrl}/messages.json`)
    .then(r => r.json())
    .then(d => { if (d) Object.keys(d).forEach(k => knownKeys.add(k)); })
    .catch(() => {})
    .finally(() => { fbListener = setInterval(pollFB, 2500); });
}
function stopFirebase() { if (fbListener) { clearInterval(fbListener); fbListener = null; } }
function pollFB() {
  if (!firebaseUrl) return;
  fetch(`${firebaseUrl}/messages.json`)
    .then(r => r.json())
    .then(data => {
      if (!data || typeof data !== 'object') return;
      Object.entries(data).forEach(([key, msg]) => {
        if (knownKeys.has(key)) return;
        knownKeys.add(key);
        const type = msg.type || 'green';
        if (growOne(type)) {
          const name = msg.name || 'Ẩn danh', text = msg.text || '';
          const icon = type === 'pink' ? '🌸' : type === 'red' ? '🌺' : '🌿';
          showToast(`${icon} ${name}: "${text.slice(0,42)}${text.length>42?'…':''}"`);
          addTicker(name, text);
        }
      });
    })
    .catch(() => {});
}

// ===== AUTO DEMO — xen kẽ 3 loại =====
let isAuto = false, autoInterval = null;
const demoMsgs = ['Chúc tốt lành!','Cây xanh là lá phổi','Trồng cây giữ tương lai','Mỗi lá là hy vọng','Thiên nhiên cho bình yên','Yêu thương cây cỏ','Một cây nên non','Xanh mãi tuổi trẻ'];
const demoTypes = ['green','green','pink','green','red','pink','green','red'];
let demoIdx = 0;

$('btnAuto').addEventListener('click', () => { isAuto ? stopAutoDemo() : startAutoDemo(); });

function startAutoDemo() {
  isAuto = true; $('btnAuto').textContent = '⏸ Dừng';
  demoIdx = 0;
  autoInterval = setInterval(() => {
    if (currentPatch >= patches.length) { stopAutoDemo(); return; }
    const type = demoTypes[demoIdx % demoTypes.length];
    const text = demoMsgs[demoIdx % demoMsgs.length];
    const icon = type === 'pink' ? '🌸' : type === 'red' ? '🌺' : '🌿';
    if (growOne(type)) {
      showToast(`${icon} Demo: "${text}"`);
      addTicker('Demo', text);
    }
    demoIdx++;
  }, 500);
}
function stopAutoDemo() {
  isAuto = false; $('btnAuto').textContent = '▶ Demo';
  if (autoInterval) { clearInterval(autoInterval); autoInterval = null; }
}

// ===== CONTROLS =====
$('btnReset').addEventListener('click', () => {
  if (!img2) return;
  stopAutoDemo(); stopFirebase(); knownKeys.clear();
  $('tickerTrack').innerHTML = ''; $('ticker').classList.add('hidden');
  initCanvas();
  if (firebaseUrl) startFirebase();
  showToast('↺ Đã reset cây');
});

// ===== LIGHTBOX =====
function openLightbox(s) { $('lightboxImg').src = s; $('lightbox').classList.add('open'); }
function closeLightbox() { $('lightbox').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
cv.addEventListener('click', e => {
  if (!trunkPhotos.length) return;
  const rect = cv.getBoundingClientRect();
  const mx = (e.clientX-rect.left)/rect.width*CW, my = (e.clientY-rect.top)/rect.height*CH;
  const tcx = CW*0.50, tcy = CH*carouselCY;
  const orx = CW*0.16, ory = CH*0.02;
  const pw = CW*0.09, ph = pw*0.8, n = trunkPhotos.length, as = (Math.PI*2)/n;
  let clicked = null, best = -2;
  for (let i = 0; i < n; i++) {
    const a = trunkAngle+i*as, cosA = Math.cos(a), sinA = Math.sin(a), depth = sinA;
    if (depth < 0.2) continue;
    const sc = 0.35+(depth+1)*0.5*0.65;
    const px = tcx+cosA*orx, py = tcy+sinA*ory, sw = pw*sc, sh = ph*sc;
    if (mx>px-sw/2 && mx<px+sw/2 && my>py-sh/2 && my<py+sh/2 && depth>best) { clicked = trunkPhotos[i]; best = depth; }
  }
  if (clicked) openLightbox(clicked.src);
});

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
